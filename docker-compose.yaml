version: '3.8'

services:
  # Backend Service
  server:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: devops-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - MYSQL_DATABASE=devops
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - LOG_LEVEL=info
      # JWT Configuration (Change in production)
      - JWT_SECRET=devops-secret-key
      - JWT_EXPIRATION=24
      # Add other necessary env vars here
    depends_on:
      - mysql
      - redis
    networks:
      - devops-net
    restart: unless-stopped

  # Frontend Service
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: devops-web
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - devops-net
    restart: unless-stopped

  # Database Service
  mysql:
    image: mysql:8.0
    container_name: devops-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=devops
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Initialize database with migrations
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - devops-net
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped

  # Cache Service
  redis:
    image: redis:alpine
    container_name: devops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devops-net
    restart: unless-stopped

networks:
  devops-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:

# 功能描述：生产部署配置，包含 MySQL、Redis 与 DevOps 应用容器
#           环境变量从根目录 .env 加载，数据通过卷持久化
#********************************************************************

services:
  # ----------------------------------------------------------------
  # MySQL 数据库容器（使用已有容器时注释此块）
  # ----------------------------------------------------------------
  mysql:
    image: mysql:8.0.34
    container_name: devops-mysql
    privileged: true
    restart: unless-stopped
    networks:
      - devops_network
    ports:
      - 3306:3306
    volumes:
      - ./MySqlData:/var/lib/mysql
    environment:
      # root 用户密码（必填，MySQL 容器初始化必需）
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-${MYSQL_PASSWORD}}
      # 普通用户配置（可选，启用后会创建普通用户并授予 MYSQL_DATABASE 全部权限）
      # MYSQL_USER: ${MYSQL_USER}
      # MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  # ----------------------------------------------------------------
  # Redis 缓存容器（使用已有容器时注释此块）
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: devops-redis
    restart: unless-stopped
    networks:
      - devops_network
    ports:
      - 6379:6379
    volumes:
      - ./redisData:/data
    environment:
      TZ: Asia/Shanghai

  # ----------------------------------------------------------------
  # DevOps 应用容器
  # ----------------------------------------------------------------
  devops:
    image: registry.cn-shenzhen.aliyuncs.com/zyx3721/jeridevops:latest
    container_name: devops
    restart: unless-stopped
    networks:
      - devops_network
    ports:
      - 80:80  # 宿主机:容器（容器内 Nginx 监听 80，反向代理到 Go 8080）
    env_file:
      - .env
    volumes:
      - ./DevOpsData:/app/data
    # ----------------------------------------------------------------
    # 依赖新建容器（使用已有容器时注释此块）
    # ----------------------------------------------------------------
    depends_on:
      - mysql
      - redis

networks:
  devops_network:
    driver: bridge

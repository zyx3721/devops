[supervisord]
nodaemon=true
user=root
logfile=/app/logs/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
stdout_logfile=/app/logs/nginx-stdout.log
stderr_logfile=/app/logs/nginx-stderr.log
priority=10

[program:devops-server]
command=/app/devops
autostart=true
autorestart=true
stdout_logfile=/app/logs/devops-stdout.log
stderr_logfile=/app/logs/devops-stderr.log
priority=20
